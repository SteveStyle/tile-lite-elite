# Pinned explicitly rather than left to derive from the containing
# directory's basename — that basename also determines the image tags
# `docker compose build` produces (`<name>-server`, `<name>-web`), which
# `scripts/deploy.sh` references by their exact tag, so an unpinned name
# would silently break `docker save` the moment the directory's renamed.
name: tile-lite-elite

services:
  server:
    build:
      context: .
      target: runtime-server
    environment:
      TILE_LITE_ELITE_BIND: 0.0.0.0:3000
      TILE_LITE_ELITE_DATABASE_URL: sqlite:///data/tile-lite-elite.sqlite3
    volumes:
      - tile-lite-elite-data:/data
    restart: unless-stopped
    # Deliberately no `ports:` — only reachable from the `web` container
    # over the compose network, and via `docker compose exec server ...`
    # on the host. That keeps the admin endpoints' existing loopback-only
    # guard meaningful: a request proxied in from `web` is not loopback and
    # gets rejected by the app itself, same as it would locally.

  web:
    build:
      context: .
      target: runtime-web
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp" # HTTP/3 (QUIC) — Caddy tries this opportunistically; harmless if the port's blocked upstream, just falls back to HTTP/2.
    volumes:
      # Caddy's obtained TLS certificates live here — without this, a
      # container recreation (not just a restart) would silently re-request
      # a fresh certificate from Let's Encrypt every time.
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - server
    restart: unless-stopped

volumes:
  # Named volume rather than a bind mount, so it isn't tied to a specific
  # host path — back it up with `docker run --rm -v tile-lite-elite-data:/data
  # -v "$PWD":/backup debian tar czf /backup/tile-lite-elite-data.tgz -C /data .`
  #
  # Explicit `name:` on every volume below, rather than letting Compose
  # derive one from the containing directory's basename — that basename is
  # otherwise the *actual* volume name (e.g. `scrabble-px_scrabble-data`),
  # so renaming the project directory would silently start a fresh, empty
  # volume on next deploy instead of reattaching to the existing one.
  tile-lite-elite-data:
    name: tile-lite-elite-data
  caddy-data:
    name: tile-lite-elite-caddy-data
  caddy-config:
    name: tile-lite-elite-caddy-config
