name: CI

# The `check` job (fmt · clippy · test · wasm) runs on every push (any branch),
# on pull requests, and on demand. The heavier `e2e` job (Playwright against the
# staging Docker stack) is gated to main pushes, PRs, and manual runs — it does a
# full image build, so it doesn't run on every branch push. See
# docs/3.3-testing-ci-and-release.md for how this fits alongside local staging.
on:
  push:
  pull_request:
  workflow_dispatch:

# A newer push to the same branch/PR cancels an in-progress run for it, so we
# don't burn minutes finishing a run that's already superseded.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # .cargo/config.toml sets `rustc-wrapper = sccache` for fast local rebuilds,
  # but sccache isn't installed on the runner and is incompatible with the
  # wasm32 target anyway (see docs/3.2-development.md's "Known Build Issues").
  # An empty value disables the wrapper for the whole job; the wasm32
  # `target-feature` rustflags in that same config file still apply.
  RUSTC_WRAPPER: ""

jobs:
  check:
    name: fmt · clippy · test · wasm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # srm-utils is a git dependency (github.com/SteveStyle/utils), pulled in
      # only by the archived old-crates. The checkout above doesn't fetch it;
      # cargo does, during the first build step below. That repo must be
      # reachable by the runner (it's public) for resolution to succeed.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry and build output
        uses: Swatinem/rust-cache@v2

      # Formatting is checked only on the crates in this repo. old-crates are
      # an untouched historical archive and are excluded from the lint gate.
      - name: Format check
        run: >
          cargo fmt
          -p api -p engine-core -p rules-shared
          -p server-game -p admin-cli -p tile-lite-elite-ui
          --check

      # -D warnings makes any clippy or rustc warning fail the build. Scoped to
      # this repo's crates (old-crates carry many pre-existing warnings we don't
      # maintain), but across all targets so tests and examples are linted too.
      - name: Clippy (deny warnings)
        run: >
          cargo clippy
          --workspace --exclude first-try --exclude second-try
          --all-targets
          -- -D warnings

      # Full workspace, including old-crates (their tests still pass and the git
      # utils dependency resolves, so there's no reason to hide them here).
      - name: Test
        run: cargo test --workspace

      # Compiles the web client to wasm — the deploy's Docker build does this
      # too, and native checks above won't catch wasm-only breakage. This is a
      # plain cargo compile (default `web` feature); it deliberately does not
      # run the full dx / wasm-bindgen packaging pipeline the release build uses.
      - name: Wasm build (web client)
        run: cargo build -p tile-lite-elite-ui --target wasm32-unknown-unknown

  # End-to-end UI tests: build + run the staging Docker stack (the same images
  # scripts/deploy.sh ships — so the fragile dx/wasm-bindgen packaging is done
  # inside the Dockerfile, not reproduced on the runner) and drive the real
  # client in a browser with Playwright. Heavier than `check` (a full image
  # build), so it's gated to main pushes / PRs / manual runs, and only after
  # `check` passes — no point burning a build if the code doesn't lint. See
  # docs/3.3's runbook step 3 and e2e/README.md.
  e2e:
    name: e2e (Playwright · staging stack)
    runs-on: ubuntu-latest
    needs: check
    if: >
      github.event_name == 'pull_request' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    steps:
      - uses: actions/checkout@v4

      - name: Build and start the staging stack
        env:
          TILE_LITE_ELITE_BUILD_ID: ${{ github.sha }}
        run: docker compose -f docker-compose.staging.yml up --build -d

      - name: Wait for staging to be healthy
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8081/health >/dev/null; then
              echo "staging is up:"; curl -s http://localhost:8081/health; echo
              exit 0
            fi
            sleep 5
          done
          echo "::error::staging did not become healthy within 5 minutes"
          docker compose -f docker-compose.staging.yml logs --tail=200
          exit 1

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install E2E dependencies
        working-directory: e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run Playwright suite
        working-directory: e2e
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:8081
        run: npm test

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

      - name: Tear down the staging stack
        if: always()
        run: docker compose -f docker-compose.staging.yml down -v
